<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>A Esmorga - Mapa interactivo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
/* ==================================================
   TEMA COMPLETO: NOCHE EN AURIA
   Pegar dentro de <style>
================================================== */




html,body{
  margin:0;
  height:100%;
  overflow:hidden;

  font-family: "Georgia", "Times New Roman", serif;

  background:
  linear-gradient(rgba(5,5,10,0.78), rgba(10,10,18,0.88)),
  url("iconos/inicio.jpg");

  background-size:cover;
  background-position:center;
}


.popup-img{
  text-align:center;
  width:220px;
}

.popup-img img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:12px;
}

.popup-img h3{
  margin:10px 0 0;
  color:#d4af37;
  font-size:16px;
}

/* MAPA */

#map{
  height:100%;
  width:100%;
  display:none;
}


/* ===============================
   INTRO INICIAL
================================= */

#controls{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:5000;

  text-align:center;

  width:460px;
  max-width:90vw;

  padding:45px 35px;

  border-radius:22px;

  background:rgba(10,10,18,0.58);
  backdrop-filter:blur(12px);

  box-shadow:
  0 0 25px rgba(0,0,0,0.55),
  0 0 80px rgba(212,175,55,0.08);

  border:1px solid rgba(212,175,55,0.18);
}


/* TITULO */

#controls h1{
  margin:0;
  font-size:52px;
  letter-spacing:3px;
  color:#d4af37;
  text-shadow:0 0 18px rgba(212,175,55,0.28);
}


/* SUBTITULO */

#controls .subtitulo{
  margin-top:12px;
  font-size:18px;
  color:#ffffff;
  opacity:0.92;
}


/* AUTOR */

#controls .autor{
  margin-top:28px;
  font-size:14px;
  letter-spacing:1px;
  color:#ffffff;
  opacity:0.72;
}


/* BOTONES */

button{
  border:none;
  border-radius:12px;

  padding:13px 24px;
  margin-top:18px;

  font-size:16px;
  font-family:inherit;

  cursor:pointer;

  transition:0.25s ease;
}


/* BOTON PRINCIPAL */

#start{
  background:#d4af37;
  color:#111;
  font-weight:bold;

  box-shadow:0 0 18px rgba(212,175,55,0.25);
}

#start:hover{
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 0 28px rgba(212,175,55,0.45);
}


/* BOTONES NAVEGACION */

#prev,#next,#pause{
  background:rgba(255,255,255,0.10);
  color:white;
}

#prev:hover,#next:hover,#pause:hover{
  background:rgba(255,255,255,0.18);
}


/* ===============================
   PANEL LATERAL
================================= */

#info{
  position:absolute;
  left:15px;
  top:15px;

  width:430px;
  height:calc(100vh - 30px);

  padding:28px;

  overflow-y:auto;

  display:none;
  z-index:3000;

  color:#f5f5f5;

  background:rgba(8,8,14,0.68);
  backdrop-filter:blur(14px);

  border-radius:22px;

  border:1px solid rgba(212,175,55,0.18);

  box-shadow:
  0 0 35px rgba(0,0,0,0.45),
  0 0 40px rgba(212,175,55,0.04);

  line-height:1.65;
  font-size:16px;
}


/* TITULOS PANEL */

#info b{
  color:#d4af37;
  font-size:18px;
}


/* SCROLL */

#info::-webkit-scrollbar{
  width:8px;
}

#info::-webkit-scrollbar-thumb{
  background:rgba(212,175,55,0.45);
  border-radius:10px;
}


/* ===============================
   MINI POPUP FLOTANTE
================================= */

#miniPopup{
  position:absolute;
  z-index:4000;

  min-width:230px;
  max-width:300px;

  padding:15px;

  display:none;

  color:white;

  background:rgba(12,12,20,0.78);
  backdrop-filter:blur(10px);

  border-radius:16px;

  border:1px solid rgba(212,175,55,0.18);

  box-shadow:
  0 12px 28px rgba(0,0,0,0.45);

  font-size:14px;
  line-height:1.5;
}


/* ===============================
   POPUPS LEAFLET (si los usas)
================================= */

.leaflet-popup-content-wrapper{
  background:rgba(12,12,20,0.82);
  color:white;
  border-radius:16px;
  backdrop-filter:blur(10px);
  border:1px solid rgba(212,175,55,0.18);
}

.leaflet-popup-tip{
  background:rgba(12,12,20,0.82);
}

.leaflet-popup-content{
  margin:14px;
  line-height:1.5;
}


/* ===============================
   EFECTO NIEBLA SUTIL
================================= */

body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;

  background:
  radial-gradient(circle at 20% 30%, rgba(255,255,255,0.03), transparent 30%),
  radial-gradient(circle at 80% 60%, rgba(255,255,255,0.02), transparent 35%),
  radial-gradient(circle at 60% 20%, rgba(255,255,255,0.02), transparent 25%);
}


/* ===============================
   RESPONSIVE
================================= */

/* =========================
   iPad / Tablet
========================= */
/* =========================
   iPad
========================= */
@media (max-width: 1024px){

  /* PANEL LATERAL */
  #info{
    width:230px;
    height:82vh;

    left:10px;
    top:10px;

    padding:16px;

    font-size:14px;
    line-height:1.45;
  }

  /* TITULOS PANEL */
  #info b{
    font-size:16px;
  }

  /* BOTONERA */
  #controls{
    gap:6px;
  }

  /* BOTONES */
  #controls button{
    padding:8px 12px;
    font-size:13px;
    border-radius:10px;
    max-width:140px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }



}
</style>
</head>

<body>

<div id="controls">

  <h1 style="margin:0;font-size:42px;">A ESMORGA</h1>

  <p style="margin-top:10px;color:#ffffff;font-size:18px;opacity:0.9;">
    Mapa literario interactivo de Ourense
  </p>

  <p style="margin-top:25px;color:#d4af37;font-size:15px;opacity:0.7;">
    Por Inés Ulloa e Germán Portela
  </p>

  <button id="start" style="margin-top:20px;">
    Comezar a viaxe
  </button>

  <button id="prev" style="display:none;">←</button>
  <button id="pause" style="display:none;">⏸</button>
  <button id="next" style="display:none;">→</button>

</div>
<div id="miniPopup"></div>
<div id="info"></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
window.addEventListener('DOMContentLoaded', () => {

let map;
let markers = [];
let indiceActual = 0;
let timeoutHistoria;
let pausa = false;

const iconoPonte = L.icon({
  iconUrl: 'iconos/ponte.png',
  iconSize: [72, 72]
});

const iconoRio = L.icon({
  iconUrl: 'iconos/rio.png',
  iconSize: [72, 72]
});

const iconoPraza = L.icon({
  iconUrl: 'iconos/praza.png',
  iconSize: [72, 72]
});

const iconoCasco = L.icon({
  iconUrl: 'iconos/casco.png',
  iconSize: [72, 72]
});

const iconoCatedral = L.icon({
  iconUrl: 'iconos/catedral.png',
  iconSize: [72, 72]
});

const iconoCasa = L.icon({
  iconUrl: 'iconos/casa.png',
  iconSize: [72, 72]
});

const iconoFonte = L.icon({
  iconUrl: 'iconos/fonte.png',
  iconSize: [72, 72]
});



const recorrido = [

{
nombre:"Ponte Vella",
coords:[42.34483737325874,-7.8688482241599615],
info:"<b>Ponte Romana de Ourense</b><br><b>Pasaxe:</b> “E pasamos a ponte, co río negro por baixo, que metía medo.”<br><b>Que sucede na novela:</b> Os protagonistas cruzan a ponte nun dos seus desprazamentos nocturnos, cando o cansazo, o alcohol e a desorientación comezan a dominar.<br><b>Relación e significado:</b> A ponte funciona como espazo de transición: cada vez que a cruzan, afástanse máis da “normalidade” e achéganse ao desastre final.Narealidade, corresponde á Ponte Romana, paso histórico fundamental de Ourense.",
icono:iconoPonte,
img:"imaxes/ponte.jpg"
},

{
nombre:"Río Miño",
coords:[42.34549173745552,-7.86734287842458],
info:"<b>Río Miño</b><br><b>Pasaxe:</b> “O río ía calado, coma se tamén soubera todo.”<br><b>Que sucede na novela:</b> O río acompaña constantemente o percorrido dos personaxes. Aparece como fondo en varios momentos, especialmente cando a noite se volve máis escura e tensa.<br><b>Relación e significado:</b> O Miño non é só escenario: é unha presenza simbólica, silenciosa e ameazante, que parece anticipar o final tráxico. representa o destino inevitable.",
icono:iconoRio,
img:"imaxes/rio.jpg"
},

{
nombre:"Praza do Ferro",
coords:[42.33768602721665,-7.863260809321872],
info:"<b>As tabernas (Praza do Ferro)</b><br><b>Pasaxe:</b> “Entramos noutra tasca, xa medio sen saber onde andabamos.”<br><b>Que sucede na novela:</b> Gran parte da esmorga transcorre encadeando tabernas: os personaxes beben sen control, discuten, provocan conflitos e van perdendo progresivamente o xuízo.<br><b>Relación e significado:</b> Son o motor da acción: cada parada intensifica o caos, a violencia e a autodestrución.",
icono:iconoPraza,
img:"imaxes/praza.jpg"
},

{
nombre:"Casco histórico",
coords:[42.340094739025716,-7.863967755715748],
info:"<b>Casco histórico de Ourense</b><br><b>Pasaxe:</b> “As rúas eran estreitas e tortas, e parecía que nunca se acababan.”<br><b>Que sucede na novela:</b> Os protagonistas vagan sen rumbo polas rúas, perdéndose e reaparecendo en distintos puntos.<br><b>Relación e significado:</b> O casco histórico serve como espazo de confusión e extravío. A súa estrutura real, estreita e irregular, reforza a sensación de perda de control.",
icono:iconoCasco,
img:"imaxes/casco.jpg"
},

{
nombre:"Catedral",
coords:[42.336352702777475,-7.863113562878453],
info:"<b>Catedral de San Martiño de Ourense</b><br><b>Pasaxe:</b> “Pasamos por diante da igrexa, toda calada, coma morta.”<br><b>Que sucede na novela:</b> Os personaxes pasan por diante dun edificio relixioso sen deter a súa marcha.<br><b>Relación e significado:</b> A catedral aparece desposuída de función moral, subliñando a ausencia de límites éticos na esmorga.",
icono:iconoCatedral,
img:"imaxes/catedral.jpg"
},

{
nombre:"Casa abandonada",
coords:[42.3440,-7.8715],
info:"<b>Casa abandonada</b><br><b>Pasaxe:</b> “A casa estaba caída e cheiraba a humidade e cousas vellas.”<br><b>Que sucede na novela:</b> Os protagonistas refúxianse na casa, onde se producen actos de destrución, tensión e violencia.<br><b>Relación e significado:</b> A casa simboliza a decadencia absoluta. Podería corresponder a antigas vivendas señoriais das aforas de Ourense, xa en ruínas na época.",
icono:iconoCasa

},

{
nombre:"Fonte do Rei",
coords:[42.3369,-7.8642],
info:"<b>Fonte do Rei</b><br><b>Pasaxe:</b> “Fomos dar á fonte, onde paramos un pouco.”<br><b>Que sucede:</b> Momento de pausa dentro da esmorga, pero xa cun ambiente cargado.<br><b>Relación:</b> Lugar real mencionado en roteiros literarios da novela.",
icono:iconoFonte
},

{
nombre:"Praza do Corrixidor",
coords:[ 42.33641181512121,-7.862097329058486],
info:"<b>Praza do Corrixidor</b><br><b>Pasaxe:</b> “Había xente na praza, pero nós iamos ao noso.”<br><b>Que sucede:</b> Paso por un espazo público onde se cruzan con máis xente, pero xa están illados na súa propia dinámica de autodestrución.<br><b>Relación:</b> Praza real mencionada nos percorridos da esmorga.",
icono:iconoPraza,
img:"imaxes/fonte.jpg"
}

];

function mostrarMiniPopup(punto){

  const panel = document.getElementById("miniPopup");

  const pos = map.latLngToContainerPoint(punto.coords);

  panel.innerHTML = `
<img src="${punto.img}" style="width:100%;border-radius:12px;">
<h3>${punto.nombre}</h3>
`;

  panel.style.left = (pos.x + 40) + "px";
  panel.style.top  = (pos.y - 30) + "px";

  panel.style.display = "block";
}

function mostrarPunto(i){

  if(!recorrido[i]) return;

  indiceActual = i;
  const punto = recorrido[i];

  if(!map.hasLayer(markers[i])){
    markers[i].addTo(map);
  }

  // Panel lateral
  document.getElementById("info").style.display = "block";
  document.getElementById("info").innerHTML = punto.info;

  // Centrar mapa primero
  map.flyTo(punto.coords, 17, {
    duration: 2.5,
    easeLinearity: 0.25
  });

  // Esperar al movimiento para abrir popup
  setTimeout(() => {

    const pos = map.latLngToContainerPoint(punto.coords);
    const size = map.getSize();

    let offsetX = 35;
    let offsetY = -5;

    // Cerca borde izquierdo
    if(pos.x < 120){
      offsetX = 80;
    }

    // Cerca borde derecho
    else if(pos.x > size.x - 120){
      offsetX = -80;
    }

    // Cerca arriba
    if(pos.y < 100){
      offsetY = 40;
    }

    // Cerca abajo
    else if(pos.y > size.y - 100){
      offsetY = -60;
    }

    markers[i]
      .bindPopup(punto.info,{
        offset:[offsetX, offsetY]
      })
      mostrarMiniPopup(punto);

  }, 2600);

  actualizarBotones();
}

function actualizarBotones(){

document.getElementById("prev").textContent =
indiceActual > 0 ? "← " + recorrido[indiceActual-1].nombre : "Inicio";

document.getElementById("next").textContent =
indiceActual < recorrido.length-1 ?
recorrido[indiceActual+1].nombre + " →" :
"Final";
}

function siguienteAutomatico(){

if(pausa) return;

mostrarPunto(indiceActual);

indiceActual++;

if(indiceActual < recorrido.length){
timeoutHistoria = setTimeout(siguienteAutomatico,5000);
}
}

function togglePausa(){

pausa = !pausa;

const btn = document.getElementById("pause");

if(pausa){
clearTimeout(timeoutHistoria);
btn.textContent = "▶";
}else{
btn.textContent = "⏸";
timeoutHistoria = setTimeout(siguienteAutomatico,1000);
}
}

document.getElementById("start").addEventListener("click",()=>{

document.getElementById("map").style.display="block";

map = L.map('map');

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
).addTo(map);

markers = recorrido.map(p =>
  L.marker(p.coords,{icon:p.icono}).bindPopup(`
    <div class="popup-img">
      <img src="${p.img}">
      <h3>${p.nombre}</h3>
    </div>
  `)
);
const lineaCoords = recorrido.map(p => p.coords);



map.fitBounds(lineaCoords,{
padding:[50,50],
maxZoom:17
});

const controls = document.getElementById("controls");

controls.style.top="10px";
controls.style.left="auto";
controls.style.right="10px";
controls.style.transform="none";

document.getElementById("start").style.display="none";
document.getElementById("prev").style.display="inline-block";
document.getElementById("next").style.display="inline-block";
document.getElementById("pause").style.display="inline-block";

indiceActual = 0;

setTimeout(siguienteAutomatico,1000);

});

document.getElementById("next").addEventListener("click",()=>{

clearTimeout(timeoutHistoria);

if(indiceActual < recorrido.length-1){
indiceActual++;
mostrarPunto(indiceActual);
indiceActual++;
}

if(!pausa){
timeoutHistoria = setTimeout(siguienteAutomatico,5000);
}

});

document.getElementById("prev").addEventListener("click",()=>{

clearTimeout(timeoutHistoria);

if(indiceActual > 1){
indiceActual = indiceActual - 2;
mostrarPunto(indiceActual);
indiceActual++;
}

if(!pausa){
timeoutHistoria = setTimeout(siguienteAutomatico,5000);
}

});

document.getElementById("pause").addEventListener("click",togglePausa);

});
</script>

</body>
</html>
